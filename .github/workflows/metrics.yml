name: GitHub Metrics

on:
  # Auto-refresh every 6 hours
  schedule:
    - cron: "0 */6 * * *"
  # Lets you trigger it manually from the Actions tab
  workflow_dispatch: {}
  # Regenerate whenever you push to this repo
  push:
    branches: [main]

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: nuraliyevo94
          filename: github-metrics.svg
          template: classic
          config_timezone: Asia/Tashkent

          # Sections to render
          base: header, activity, community, repositories, metadata

          # Top languages (replaces the old top-langs card)
          plugin_languages: yes
          plugin_languages_analysis_timeout: 15
          plugin_languages_categories: programming, markup
          plugin_languages_colors: github
          plugin_languages_limit: 8
          plugin_languages_recent_categories: programming, markup
          plugin_languages_recent_days: 14
          plugin_languages_threshold: 0%

          # Recent activity (replaces the old streak/contribution-graph cards)
          plugin_activity: yes
          plugin_activity_limit: 5
          plugin_activity_days: 14
          plugin_activity_visibility: public

